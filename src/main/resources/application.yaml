# 应用服务 WEB 访问端口
server:
  port: 8081

spring:
  rabbitmq:
    listener:
      simple:
        # 每个线程只预取 1 条消息。干不完（没 Ack）之前，MQ 不准发下一条。
        prefetch: 1
        acknowledge-mode: manual
  redis:
    host: 127.0.0.1
    port: 6379
    password: 123456
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  profiles:
    active: local

sandbox:
  api-key: NOT_IN_THIS_FILE
  judge:
    pool-sizes:
      java: 1
      python: 1
      cpp: 1
    concurrences:
      java: 1
      python: 1
      cpp: 1
  rabbitmq:
    enabled: false
    result-type: mq # mq/redis
  docker:
    cpu-limit: 1     # CPU 限制，单位核数
    memory-limit: 64 # 内存限制，单位 MB
    pid-limit: 32    # 进程数限制
    images:
      java: eclipse-temurin:8-jdk-alpine
      python: python:3.11-alpine
      cpp: frolvlad/alpine-gxx